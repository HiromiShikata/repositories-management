# Direct edits in downstream repositories will be overwritten by the next sync.
# Update the source file in HiromiShikata/repositories-management instead.

name: Create PR

on:
  push:
    branches-ignore:
      - main

jobs:
  create_and_enable_automerge:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Generate hs-bot-gh-ap installation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.HS_BOT_GH_AP_CLIENT_ID }}
          private-key: ${{ secrets.HS_BOT_GH_AP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set branch name as output
        id: branch_name
        run: echo "branch=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"

      - name: Check if PR already exists
        id: check_pr
        run: |
          EXISTING_PR=$(gh pr list --head "${{ steps.branch_name.outputs.branch }}" --base main --json number --jq '.[0].number // empty')
          echo "existing_pr=$EXISTING_PR" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Create Pull Request
        id: create_pr
        if: steps.check_pr.outputs.existing_pr == ''
        uses: repo-sync/pull-request@7e79a9f5dc3ad0ce53138f01df2fad14a04831c5
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          destination_branch: 'main'
          source_branch: ''
          pr_title: '${{ steps.branch_name.outputs.branch }}'
          pr_body: |
            :magic_wand: :sparkles:

          pr_draft: false

      - name: Resolve PR number
        id: resolve_pr
        run: |
          PR_NUMBER="${{ steps.create_pr.outputs.pr_number }}"
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER="${{ steps.check_pr.outputs.existing_pr }}"
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Get PR Node ID
        if: steps.resolve_pr.outputs.pr_number
        id: get_pr_id
        run: |
          PR_DATA=$(curl -s -H "Authorization: token ${{ steps.app-token.outputs.token }}" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/${{ github.repository }}/pulls/${{ steps.resolve_pr.outputs.pr_number }}")
          PR_ID=$(echo "$PR_DATA" | jq -r '.node_id')
          echo "node_id=$PR_ID" >> "$GITHUB_OUTPUT"

      - name: Check auto-merge capability
        if: steps.resolve_pr.outputs.pr_number
        id: check_auto_merge
        run: |
          REPO_DATA=$(curl -s \
            -H "Authorization: token ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}")
          ALLOW_AUTO_MERGE=$(echo "$REPO_DATA" | jq -r '.allow_auto_merge')
          echo "allowed=$ALLOW_AUTO_MERGE" >> "$GITHUB_OUTPUT"
          if [ "$ALLOW_AUTO_MERGE" != "true" ]; then
            echo "Repository has allow_auto_merge disabled. Skipping auto-merge enablement."
            exit 0
          fi
          ALLOW_SQUASH=$(echo "$REPO_DATA" | jq -r '.allow_squash_merge')
          ALLOW_MERGE=$(echo "$REPO_DATA" | jq -r '.allow_merge_commit')
          ALLOW_REBASE=$(echo "$REPO_DATA" | jq -r '.allow_rebase_merge')
          if [ "$ALLOW_SQUASH" = "true" ]; then
            MERGE_METHOD="SQUASH"
          elif [ "$ALLOW_MERGE" = "true" ]; then
            MERGE_METHOD="MERGE"
          elif [ "$ALLOW_REBASE" = "true" ]; then
            MERGE_METHOD="REBASE"
          else
            echo "No allowed merge method found in repository settings: allow_squash_merge=$ALLOW_SQUASH, allow_merge_commit=$ALLOW_MERGE, allow_rebase_merge=$ALLOW_REBASE"
            exit 1
          fi
          echo "Detected merge method: $MERGE_METHOD"
          echo "merge_method=$MERGE_METHOD" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Enable Auto Merge for PR
        if: steps.resolve_pr.outputs.pr_number && steps.check_auto_merge.outputs.allowed == 'true'
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: bearer ${{ steps.app-token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"mutation(\$id: ID!, \$mergeMethod: PullRequestMergeMethod!) { enablePullRequestAutoMerge(input: { pullRequestId: \$id, mergeMethod: \$mergeMethod }) { clientMutationId } }\",
              \"variables\": {
                \"id\": \"${{ steps.get_pr_id.outputs.node_id }}\",
                \"mergeMethod\": \"${{ steps.check_auto_merge.outputs.merge_method }}\"
              }
            }" \
            "https://api.github.com/graphql")
          echo "$RESPONSE"
          if echo "$RESPONSE" | jq -e '.errors' >/dev/null; then
            echo "Failed to enable auto merge with merge method ${{ steps.check_auto_merge.outputs.merge_method }}"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
