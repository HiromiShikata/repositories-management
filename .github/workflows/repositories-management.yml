name: Repositories Management

concurrency:
  group: repositories-management-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 15 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.github/dependabot.yml'
      - 'labels.yaml'
      - 'renovate.json'
  workflow_dispatch:

env:
  ORG_NAME: HiromiShikata
  TEAM_REPOS: '7sea.world, blog-tech, media-pinpoint-research, instagram-beauty-aesthetics-review, umino-corporait-operation, instagram-14LBaggageTraveler, study-of-body, hashigoya-project'

jobs:
  update-repos:
    runs-on: ubuntu-latest
    env:
      GH_BOT_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - run: |
          sudo apt-get update
          sudo apt-get install gh
      - run: |
          echo $GH_BOT_TOKEN | gh auth login --with-token
      - name: Generate hs-bot-gh-ap installation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.HS_BOT_GH_AP_CLIENT_ID }}
          private-key: ${{ secrets.HS_BOT_GH_AP_PRIVATE_KEY }}
          owner: HiromiShikata
      - name: Sync Files to All repositories
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          ORG_NAME="${{ env.ORG_NAME }}"
          GITHUB_USER=$(curl -s -H "Authorization: token $GH_BOT_TOKEN" https://api.github.com/user | jq -r '.login')
          REPO_LIST=$(gh repo list $ORG_NAME --limit 1000 --json name,isArchived | jq -r '.[] | select(.isArchived == false) | .name')
          FILES_TO_SYNC=(
            ".github/workflows/umino-project.yml"
            ".github/workflows/commit-lint.yml"
            ".github/workflows/configs/commitlint.config.js"
            ".github/workflows/create-pr.yml"
            ".github/workflows/api-created_issue_pr.yml"
            ".github/workflows/secret-scan.yml"
            ".github/CODEOWNERS"
            ".github/copilot-instructions.md"
            ".github/instructions/code-review.instructions.md"
            ".github/dependabot.yml"
            "renovate.json"
            ".gitleaks.toml"
            )
          for REPO in $REPO_LIST; do
            echo "REPO: $REPO"
            gh repo clone $ORG_NAME/$REPO

            cd $REPO
            PR_LIST=$(gh pr list --state open --json number,title -q ".[] | select(.title == \"Updated common files in HiromiShikata\").number")
            echo "PR_LIST: ${PR_LIST}"
            for PR_NUMBER in $PR_LIST; do
              echo "PR_NUMBER: ${PR_NUMBER}"
              gh pr close $PR_NUMBER
            done
            prefix="project-common/update-common-files-"

            gh api repos/:owner/:repo/branches | jq -r --arg prefix "$prefix" '.[] | select(.name | startswith($prefix)) | .name' | while read branch_name; do
              echo "Deleting branch: $branch_name"
              gh api -X DELETE /repos/:owner/:repo/git/refs/heads/$branch_name
            done
            cd ../

            for FILE in "${FILES_TO_SYNC[@]}"; do
              DIRECTORY=$(dirname $FILE)
              mkdir -p $REPO/$DIRECTORY
              cp $FILE $REPO/$FILE
            done

            FILE=".github/workflows/assign-all-cards-to-owner.yml"
            rm -f $REPO/$FILE
            FILE=".github/workflows/assign-all-card-to-owner.yml"
            rm -f $REPO/$FILE
            cd $REPO
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git diff
            git add .
            git diff --staged --quiet && { echo "No changes in $REPO"; cd ..; rm -rf $REPO; continue; }
            STAGED_DIFF=$(git diff --staged)
            REMOVED_NORMALIZED=$(echo "$STAGED_DIFF" | grep '^-' | grep -v '^--- ' | sed 's/^-//' | sed "s/[\"']/Q/g" | sort)
            ADDED_NORMALIZED=$(echo "$STAGED_DIFF" | grep '^+' | grep -v '^+++ ' | sed 's/^+//' | sed "s/[\"']/Q/g" | sort)
            if [ "$REMOVED_NORMALIZED" = "$ADDED_NORMALIZED" ]; then
              echo "Only whitespace/quote-style changes in $REPO, skipping"
              cd ..; rm -rf $REPO; continue
            fi
            git commit -m "autogen: updated common files in $ORG_NAME" 
            ACTION_RUN_ID=${{ github.run_id }}
            ACTION_LINK="https://github.com/${{ github.repository }}/actions/runs/$ACTION_RUN_ID"
            BRANCH_NAME="project-common/update-common-files-$(date +%Y%m%d%H%M%S)"
            git switch -c $BRANCH_NAME
            git remote set-url origin https://x-access-token:$APP_TOKEN@github.com/$ORG_NAME/$REPO.git
            git remote -v
            git remote show origin
            git push origin $BRANCH_NAME
            PR_OUTPUT=$(GH_TOKEN=$APP_TOKEN gh pr create --head $BRANCH_NAME --title "Updated common files in $ORG_NAME" --body "This PR has been created automatically. \nLog: $ACTION_LINK" 2>&1) || { echo "Warning: Failed to create PR for $REPO (skipping): $PR_OUTPUT"; cd ..; rm -rf $REPO; continue; }
            PR_URL="$PR_OUTPUT"
            echo "PR_URL: $PR_URL"
            GH_TOKEN=$GH_BOT_TOKEN gh pr review --approve "$PR_URL"
            cd ..
            rm -rf $REPO
            sleep 10s
          done

  label-sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install GitHub Label Sync
        run: npm install -g github-label-sync

      - name: Sync Labels
        run: |
          ORG_NAME="${{ env.ORG_NAME }}"
          for repo in $(gh repo list $ORG_NAME --limit 1000 --json name,isArchived | jq -r '.[] | select(.isArchived == false and (.name | startswith("test-") | not)) | .name'); do
            github-label-sync --allow-added-labels --access-token ${{ env.GH_TOKEN }} --labels ./labels.yaml ${ORG_NAME}/$repo
            sleep 30s
          done

  secrets-sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      HS_BOT_GH_AP_APP_ID: ${{ secrets.HS_BOT_GH_AP_APP_ID }}
      HS_BOT_GH_AP_CLIENT_ID: ${{ secrets.HS_BOT_GH_AP_CLIENT_ID }}
      HS_BOT_GH_AP_PRIVATE_KEY: ${{ secrets.HS_BOT_GH_AP_PRIVATE_KEY }}
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Upsert hs-bot-gh-ap App credentials to all non-archived repos
        run: |
          ORG_NAME="${{ env.ORG_NAME }}"
          REPO_LIST=$(gh repo list $ORG_NAME --limit 1000 --json name,isArchived | jq -r '.[] | select(.isArchived == false) | .name')
          for REPO in $REPO_LIST; do
            echo "REPO: $REPO"
            gh secret set HS_BOT_GH_AP_APP_ID --body "$HS_BOT_GH_AP_APP_ID" -R "$ORG_NAME/$REPO"
            gh secret set HS_BOT_GH_AP_CLIENT_ID --body "$HS_BOT_GH_AP_CLIENT_ID" -R "$ORG_NAME/$REPO"
            gh secret set HS_BOT_GH_AP_PRIVATE_KEY --body "$HS_BOT_GH_AP_PRIVATE_KEY" -R "$ORG_NAME/$REPO"
            gh secret set HS_BOT_GH_AP_APP_ID --app dependabot --body "$HS_BOT_GH_AP_APP_ID" -R "$ORG_NAME/$REPO"
            gh secret set HS_BOT_GH_AP_PRIVATE_KEY --app dependabot --body "$HS_BOT_GH_AP_PRIVATE_KEY" -R "$ORG_NAME/$REPO"
            gh secret set GH_TOKEN --body "$GH_TOKEN" -R "$ORG_NAME/$REPO"
          done

  repository-config:
    needs: update-repos
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Prepare rate-limit-aware admin API helper
        run: |
          cat > /tmp/gh_admin_api.sh <<'HELPER'
          gh_admin_api() {
            local method="$1" url="$2" data="$3" ok_codes="$4"
            local hdr body status remaining reset retry now wait_seconds
            while true; do
              hdr="$(mktemp)"
              if [ -n "$data" ]; then
                body="$(curl -sS -X "$method" -D "$hdr" \
                  -H "Authorization: token $APP_TOKEN" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "$url" -d "$data" -w $'\n%{http_code}')"
              else
                body="$(curl -sS -X "$method" -D "$hdr" \
                  -H "Authorization: token $APP_TOKEN" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "$url" -w $'\n%{http_code}')"
              fi
              status="${body##*$'\n'}"
              body="${body%$'\n'*}"
              case " $ok_codes " in
                *" $status "*)
                  rm -f "$hdr"
                  printf '%s' "$body"
                  return 0
                  ;;
              esac
              remaining="$(grep -i '^x-ratelimit-remaining:' "$hdr" | tail -n1 | tr -d '\r' | awk '{print $2}')"
              reset="$(grep -i '^x-ratelimit-reset:' "$hdr" | tail -n1 | tr -d '\r' | awk '{print $2}')"
              retry="$(grep -i '^retry-after:' "$hdr" | tail -n1 | tr -d '\r' | awk '{print $2}')"
              rm -f "$hdr"
              if { [ "$status" = "403" ] || [ "$status" = "429" ]; } && { [ "$remaining" = "0" ] || [ -n "$retry" ]; }; then
                now="$(date +%s)"
                if [ -n "$retry" ]; then
                  wait_seconds="$retry"
                elif [ -n "$reset" ]; then
                  wait_seconds="$(( reset - now ))"
                else
                  wait_seconds=60
                fi
                [ "$wait_seconds" -lt 1 ] && wait_seconds=1
                wait_seconds="$(( wait_seconds + 5 ))"
                echo "Rate limit reached on $method $url (status=$status, remaining=${remaining:-unknown}); waiting ${wait_seconds}s until reset, then retrying the same repository." >&2
                sleep "$wait_seconds"
                continue
              fi
              echo "FATAL: non-rate-limit error on $method $url" >&2
              echo "HTTP status: $status" >&2
              echo "Response body: $body" >&2
              return 1
            done
          }
          HELPER
      - name: Generate hs-bot-gh-ap installation token for repository settings
        id: app-token-settings
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.HS_BOT_GH_AP_CLIENT_ID }}
          private-key: ${{ secrets.HS_BOT_GH_AP_PRIVATE_KEY }}
          owner: HiromiShikata
      - name: Update repository settings for all repositories
        env:
          APP_TOKEN: ${{ steps.app-token-settings.outputs.token }}
        run: |
          source /tmp/gh_admin_api.sh
          ORG_NAME="${{ env.ORG_NAME }}"
          REPO_LIST=$(gh repo list $ORG_NAME --limit 1000 --json name,isArchived | jq -r '.[] | select(.isArchived == false and (.name | startswith("test-") | not)) | .name')
          for REPO in $REPO_LIST; do
            echo "Updating merge settings for $REPO"
            gh_admin_api PATCH "https://api.github.com/repos/$ORG_NAME/$REPO" '{ "delete_branch_on_merge": true, "allow_auto_merge": true, "allow_merge_commit": false, "allow_rebase_merge": false, "allow_squash_merge": true }' "200" > /dev/null || { echo "FATAL: failed to update merge settings for $REPO"; exit 1; }
            echo "Squash-only merge settings updated for $REPO"
            sleep 30s
          done
      - name: Generate hs-bot-gh-ap installation token for branch protection
        id: app-token-protection
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.HS_BOT_GH_AP_CLIENT_ID }}
          private-key: ${{ secrets.HS_BOT_GH_AP_PRIVATE_KEY }}
          owner: HiromiShikata
      - name: Update branch protection settings for all repositories
        env:
          APP_TOKEN: ${{ steps.app-token-protection.outputs.token }}
        run: |
          source /tmp/gh_admin_api.sh
          ORG_NAME="${{ env.ORG_NAME }}"
          REPO_LIST=$(gh repo list $ORG_NAME --limit 1000 --json name,isArchived | jq -r '.[] | select(.isArchived == false and (.name | startswith("test-") | not)) | .name')
          for REPO in $REPO_LIST; do
            echo "Updating branch protection for $REPO"
            gh_admin_api PUT "https://api.github.com/repos/$ORG_NAME/$REPO/branches/main/protection" '{ "required_status_checks": { "strict": false, "contexts": ["test", "format", "commit-lint", "create_and_enable_automerge", "Check linked issues in pull requests", "umino-job"] }, "enforce_admins": false, "required_pull_request_reviews": { "required_approving_review_count": 1, "require_code_owner_reviews": true }, "restrictions": null, "required_linear_history": false, "allow_force_pushes": false, "allow_deletions": false, "required_conversation_resolution": true }' "200" > /dev/null || { echo "FATAL: failed to update branch protection for $REPO"; exit 1; }
            echo "Branch protection settings updated for $REPO"
            sleep 30s
          done
      - name: Generate hs-bot-gh-ap installation token for ruleset
        id: app-token-ruleset
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.HS_BOT_GH_AP_CLIENT_ID }}
          private-key: ${{ secrets.HS_BOT_GH_AP_PRIVATE_KEY }}
          owner: HiromiShikata
      - name: Create or update Copilot code review ruleset for all repositories
        env:
          APP_TOKEN: ${{ steps.app-token-ruleset.outputs.token }}
        run: |
          source /tmp/gh_admin_api.sh
          ORG_NAME="${{ env.ORG_NAME }}"
          REPO_LIST=$(gh repo list $ORG_NAME --limit 1000 --json name,isArchived | jq -r '.[] | select(.isArchived == false and (.name | startswith("test-") | not)) | .name')
          RULESET_NAME="copilot-code-review"
          RULESET_PAYLOAD='{
            "name": "copilot-code-review",
            "target": "branch",
            "enforcement": "active",
            "conditions": { "ref_name": { "include": ["~DEFAULT_BRANCH"], "exclude": [] } },
            "rules": [ { "type": "copilot_code_review", "parameters": { "review_draft_pull_requests": false, "review_on_push": true } } ]
          }'
          for REPO in $REPO_LIST; do
            echo "Processing Copilot code review ruleset for $REPO"
            EXISTING_RULESETS="$(gh_admin_api GET "https://api.github.com/repos/$ORG_NAME/$REPO/rulesets" "" "200")" || { echo "FATAL: failed to list rulesets for $REPO"; exit 1; }
            RULESET_ID="$(printf '%s' "$EXISTING_RULESETS" | jq -r --arg name "$RULESET_NAME" 'if type == "array" then (.[] | select(.name == $name) | .id) else empty end' | head -n1)"
            if [ -n "$RULESET_ID" ] && [ "$RULESET_ID" != "null" ]; then
              echo "Updating existing ruleset $RULESET_ID for $REPO"
              gh_admin_api PUT "https://api.github.com/repos/$ORG_NAME/$REPO/rulesets/$RULESET_ID" "$RULESET_PAYLOAD" "200" > /dev/null || { echo "FATAL: failed to update ruleset for $REPO"; exit 1; }
            else
              echo "Creating new ruleset for $REPO"
              gh_admin_api POST "https://api.github.com/repos/$ORG_NAME/$REPO/rulesets" "$RULESET_PAYLOAD" "200 201" > /dev/null || { echo "FATAL: failed to create ruleset for $REPO"; exit 1; }
            fi
            echo "Copilot code review ruleset configured for $REPO"
            sleep 30s
          done
