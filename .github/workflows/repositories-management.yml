name: Repositories Management

concurrency:
  group: repositories-management-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 15 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'labels.yaml'
      - 'renovate.json'
  workflow_dispatch:

env:
  ORG_NAME: HiromiShikata
  TEAM_REPOS: '7sea.world, blog-tech, media-pinpoint-research, instagram-beauty-aesthetics-review, umino-corporait-operation, instagram-14LBaggageTraveler, study-of-body, hashigoya-project'

jobs:
  update-repos:
    runs-on: ubuntu-latest
    env:
      GH_BOT_TOKEN: ${{ secrets.GH_TOKEN }}
      GH_APP_ID: ${{ secrets.GH_APP_ID }}
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v6
      - run: |
          sudo apt-get update
          sudo apt-get install -y gh
      - run: |
          echo $GH_BOT_TOKEN | gh auth login --with-token
      - name: Generate App token for PR approval
        id: app-token
        if: ${{ env.GH_APP_ID != '' && env.GH_APP_PRIVATE_KEY != '' }}
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ env.GH_APP_ID }}
          private-key: ${{ env.GH_APP_PRIVATE_KEY }}
          owner: ${{ env.ORG_NAME }}
      - name: Sync Files to All repositories
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          APP_TOKEN_OUTCOME: ${{ steps.app-token.outcome }}
        run: |
          ORG_NAME="${{ env.ORG_NAME }}"
          COMMON_FILES_PR_TITLE="Updated common files in $ORG_NAME"
          GITHUB_USER=$(curl -s -H "Authorization: token $GH_BOT_TOKEN" https://api.github.com/user | jq -r '.login')
          REPO_LIST=$(gh repo list $ORG_NAME --limit 1000 --json name,isArchived,isFork | jq -r '.[] | select(.isArchived == false and .isFork == false) | .name')
          FILES_TO_SYNC=(
            ".github/workflows/umino-project.yml"
            ".github/workflows/commit-lint.yml"
            ".github/workflows/configs/commitlint.config.js"
            ".github/workflows/create-pr.yml"
            ".github/workflows/api-created_issue_pr.yml"
            ".github/CODEOWNERS"
            ".github/copilot-instructions.md"
            ".github/instructions/code-review.instructions.md"
            "renovate.json"
          )
          if [ "$APP_TOKEN_OUTCOME" = "failure" ]; then
            echo "Error: GitHub App token generation failed."
            echo "Verify that GH_APP_ID and GH_APP_PRIVATE_KEY are correct and the App is installed on $ORG_NAME."
          elif [ "$APP_TOKEN_OUTCOME" = "skipped" ]; then
            echo "GH_APP_ID or GH_APP_PRIVATE_KEY not configured. PRs will not be auto-approved."
          fi
          if [ -n "$APP_SLUG" ] && ! grep -q "${APP_SLUG}\[bot\]" .github/CODEOWNERS; then
            echo "Action required: @${APP_SLUG}[bot] is not in .github/CODEOWNERS."
            echo "Add '@${APP_SLUG}[bot]' alongside @HiromiShikata so the App approval satisfies require_code_owner_reviews."
          fi
          for REPO in $REPO_LIST; do
            echo "REPO: $REPO"
            gh repo clone $ORG_NAME/$REPO

            cd $REPO
            PR_LIST=$(gh pr list --state open --json number,title -q ".[] | select(.title == \"$COMMON_FILES_PR_TITLE\").number")
            echo "PR_LIST: ${PR_LIST}"
            for PR_NUMBER in $PR_LIST; do
              echo "PR_NUMBER: ${PR_NUMBER}"
              gh pr close $PR_NUMBER
            done
            prefix="project-common/update-common-files-"
            gh api repos/:owner/:repo/branches | jq -r --arg prefix "$prefix" '.[] | select(.name | startswith($prefix)) | .name' | while read branch_name; do
              echo "Deleting branch: $branch_name"
              gh api -X DELETE /repos/:owner/:repo/git/refs/heads/$branch_name
            done
            cd ../

            for FILE in "${FILES_TO_SYNC[@]}"; do
              DIRECTORY=$(dirname $FILE)
              mkdir -p $REPO/$DIRECTORY
              cp $FILE $REPO/$FILE
            done

            FILE=".github/workflows/assign-all-cards-to-owner.yml"
            rm -f $REPO/$FILE
            FILE=".github/workflows/assign-all-card-to-owner.yml"
            rm -f $REPO/$FILE
            cd $REPO
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git diff
            git add .
            git diff --staged --quiet && { echo "No changes in $REPO"; cd ..; rm -rf $REPO; continue; }
            MEANINGFUL_DIFF=$(git diff --staged | grep '^[+-]' | grep -v '^+++ \|^--- ' | sed "s/[\"']/Q/g" | sed 's/^[+-]//' | sort | uniq -c | awk '$1 % 2 != 0 {print}')
            if [ -z "$MEANINGFUL_DIFF" ]; then
              echo "Only whitespace/quote-style changes in $REPO, skipping"
              cd ..; rm -rf $REPO; continue
            fi
            git commit -m "autogen: updated common files in $ORG_NAME"
            ACTION_LINK="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            BRANCH_NAME="project-common/update-common-files-$(date +%Y%m%d%H%M%S)"
            git switch -c $BRANCH_NAME
            git remote set-url origin https://$GITHUB_USER:$GH_BOT_TOKEN@github.com/$ORG_NAME/$REPO.git
            git remote -v
            git remote show origin
            git push origin $BRANCH_NAME
            if PR_URL=$(gh pr create --title "$COMMON_FILES_PR_TITLE" --body "This PR has been created automatically. \nLog: $ACTION_LINK" 2>/tmp/gh_pr_create_err); then
              echo "Created PR: $PR_URL"
            elif grep -qi 'already exists' /tmp/gh_pr_create_err; then
              cat /tmp/gh_pr_create_err >&2
              PR_URL=$(gh pr list --head "$BRANCH_NAME" --state open --json url --jq ".[0].url" -R "$ORG_NAME/$REPO")
              echo "Existing PR: $PR_URL"
              RACE_PR_NUMBER=$(echo "$PR_URL" | grep -oE 'pull/[0-9]+' | grep -oE '[0-9]+')
              if [ -n "$RACE_PR_NUMBER" ]; then
                gh pr edit "$RACE_PR_NUMBER" --title "$COMMON_FILES_PR_TITLE" -R "$ORG_NAME/$REPO" \
                  && echo "Updated PR $RACE_PR_NUMBER title" \
                  || echo "Warning: Could not update PR $RACE_PR_NUMBER title in $REPO"
              fi
            else
              cat /tmp/gh_pr_create_err >&2
              echo "Error creating PR for $REPO"
              cd ..
              rm -rf $REPO
              continue
            fi
            PR_NUMBER=$(echo "$PR_URL" | grep -oE 'pull/[0-9]+' | grep -oE '[0-9]+')
            if [ -n "$PR_NUMBER" ] && [ "$APP_TOKEN_OUTCOME" = "success" ] && [ -n "$APP_TOKEN" ]; then
              PR_TITLE=$(gh pr view "$PR_NUMBER" --json title --jq '.title' -R "$ORG_NAME/$REPO" 2>/dev/null || echo "")
              if [ "$PR_TITLE" = "$COMMON_FILES_PR_TITLE" ]; then
                GH_TOKEN="$APP_TOKEN" gh pr review "$PR_NUMBER" --approve -R "$ORG_NAME/$REPO" \
                  && echo "Approved PR $PR_NUMBER in $REPO" \
                  || echo "Warning: Could not approve PR $PR_NUMBER in $REPO, continuing"
              else
                echo "Warning: PR $PR_NUMBER title '$PR_TITLE' does not match expected, skipping approval"
              fi
            fi
            cd ..
            rm -rf $REPO
            sleep 10s
          done

  label-sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install GitHub Label Sync
        run: npm install -g github-label-sync

      - name: Sync Labels
        run: |
          ORG_NAME="${{ env.ORG_NAME }}"
          for repo in $(gh repo list $ORG_NAME --limit 1000 --json name,isArchived | jq -r '.[] | select(.isArchived == false and (.name | startswith("test-") | not)) | .name'); do
            github-label-sync --allow-added-labels --access-token ${{ env.GH_TOKEN }} --labels ./labels.yaml ${ORG_NAME}/$repo
            sleep 30s
          done

  repository-config:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Update repository settings for all repositories
        run: |
          ORG_NAME="${{ env.ORG_NAME }}"
          REPO_LIST=$(gh repo list $ORG_NAME --limit 1000 --json name,isArchived | jq -r '.[] | select(.isArchived == false and (.name | startswith("test-") | not)) | .name')
          GH_BOT_TOKEN="${{ secrets.GH_TOKEN }}"

          for REPO in $REPO_LIST; do
            echo "curl -f -X PATCH -H \"Authorization: token $GH_BOT_TOKEN\" -H \"Accept: application/vnd.github.v3+json\" \"https://api.github.com/repos/$ORG_NAME/$REPO\" -d '{ \"delete_branch_on_merge\": true, \"allow_auto_merge\": true, \"merge_commit_allowed\": true, \"allow_rebase_merge\": false, \"allow_squash_merge\": false }'"
            RESPONSE=$(curl -X PATCH -H "Authorization: token $GH_BOT_TOKEN" \
                            -H "Accept: application/vnd.github.v3+json" \
                            "https://api.github.com/repos/$ORG_NAME/$REPO" \
                            -d '{
                                  "delete_branch_on_merge": true,
                                  "allow_auto_merge": true,
                                  "merge_commit_allowed": true,
                                  "allow_rebase_merge": false,
                                  "allow_squash_merge": false
                                }' -w "\n%{http_code}" -s)
            echo "$RESPONSE"
            HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
            echo "$HTTP_STATUS"
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "Auto-merge and branch deletion settings updated for $REPO"
            else
              echo "Error updating settings for $REPO"
            fi
            sleep 30s
          done
      - name: Update branch protection settings for all repositories
        run: |
          ORG_NAME="${{ env.ORG_NAME }}"
          REPO_LIST=$(gh repo list $ORG_NAME --limit 1000 --json name,isArchived | jq -r '.[] | select(.isArchived == false and (.name | startswith("test-") | not)) | .name')
          GH_BOT_TOKEN="${{ secrets.GH_TOKEN }}"

          for REPO in $REPO_LIST; do
            echo "curl -X PUT -H \"Authorization: token $GH_BOT_TOKEN\" -H \"Accept: application/vnd.github.v3+json\" \"https://api.github.com/repos/$ORG_NAME/$REPO/branches/main/protection\" -d '{ \"required_status_checks\": { \"strict\": true, \"contexts\": [\"test\", \"format\", \"commit-lint\"] }, \"enforce_admins\": true, \"required_pull_request_reviews\": { \"required_approving_review_count\": 0 }, \"restrictions\": null, \"required_linear_history\": false, \"required_conversation_resolution\": true }'"
            RESPONSE=$(curl -X PUT -H "Authorization: token $GH_BOT_TOKEN" \
                            -H "Accept: application/vnd.github.v3+json" \
                            "https://api.github.com/repos/$ORG_NAME/$REPO/branches/main/protection" \
                            -d '{
                                  "required_status_checks": {
                                    "strict": true,
                                    "contexts": ["test", "format", "commit-lint", "create_and_enable_automerge", "Check linked issues in pull requests"]
                                  },
                                  "enforce_admins": false,
                                  "required_pull_request_reviews": {
                                    "required_approving_review_count": 1,
                                    "require_code_owner_reviews": true
                                  },
                                  "restrictions": null,
                                  "required_linear_history": false,
                                  "allow_force_pushes": false,
                                  "allow_deletions": false,
                                  "required_conversation_resolution": true
                                }' -w "\n%{http_code}" -s)
            HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
            echo "$RESPONSE"
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "Branch protection settings updated for $REPO"
            else
              echo "Error updating branch protection settings for $REPO"
            fi
            sleep 30s
          done
      - name: Create or update Copilot code review ruleset for all repositories
        run: |
          ORG_NAME="${{ env.ORG_NAME }}"
          REPO_LIST=$(gh repo list $ORG_NAME --limit 1000 --json name,isArchived | jq -r '.[] | select(.isArchived == false and (.name | startswith("test-") | not)) | .name')
          GH_BOT_TOKEN="${{ secrets.GH_TOKEN }}"
          RULESET_NAME="copilot-code-review"

          for REPO in $REPO_LIST; do
            echo "Processing Copilot code review ruleset for $REPO"

            EXISTING_RULESETS=$(curl -s -H "Authorization: token $GH_BOT_TOKEN" \
                                      -H "Accept: application/vnd.github+json" \
                                      "https://api.github.com/repos/$ORG_NAME/$REPO/rulesets")

            RULESET_ID=$(echo "$EXISTING_RULESETS" | jq -r ".[] | select(.name == \"$RULESET_NAME\") | .id")

            RULESET_PAYLOAD='{
              "name": "'"$RULESET_NAME"'",
              "target": "branch",
              "enforcement": "active",
              "conditions": {
                "ref_name": {
                  "include": ["~DEFAULT_BRANCH"],
                  "exclude": []
                }
              },
              "rules": [
                {
                  "type": "copilot_code_review",
                  "parameters": {
                    "review_draft_pull_requests": false,
                    "review_on_push": true
                  }
                }
              ]
            }'

            if [ -n "$RULESET_ID" ] && [ "$RULESET_ID" != "null" ]; then
              echo "Updating existing ruleset $RULESET_ID for $REPO"
              RESPONSE=$(curl -s -X PUT -H "Authorization: token $GH_BOT_TOKEN" \
                              -H "Accept: application/vnd.github+json" \
                              "https://api.github.com/repos/$ORG_NAME/$REPO/rulesets/$RULESET_ID" \
                              -d "$RULESET_PAYLOAD" -w "\n%{http_code}")
            else
              echo "Creating new ruleset for $REPO"
              RESPONSE=$(curl -s -X POST -H "Authorization: token $GH_BOT_TOKEN" \
                              -H "Accept: application/vnd.github+json" \
                              "https://api.github.com/repos/$ORG_NAME/$REPO/rulesets" \
                              -d "$RULESET_PAYLOAD" -w "\n%{http_code}")
            fi

            HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
            echo "$RESPONSE"

            if [ "$HTTP_STATUS" -eq 200 ] || [ "$HTTP_STATUS" -eq 201 ]; then
              echo "Copilot code review ruleset configured for $REPO"
            else
              echo "Error configuring Copilot code review ruleset for $REPO (HTTP $HTTP_STATUS)"
            fi

            sleep 30s
          done
